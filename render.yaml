services:
  - type: web
    name: banking-system
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/chat/health
    envVars:
      # ── Database ──
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false

      # ── Google OAuth2 (redirect URI auto-resolves, no env var needed) ──
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # ── Credit Score Microservice (set this to your deployed Render URL!) ──
      - key: CREDIT_SCORE_SERVICE_URL
        sync: false

      # ── AI Chatbot ──
      - key: AI_PROVIDER
        value: gemini
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: gemini-pro
      - key: AI_MAX_TOKENS
        value: "500"
      - key: AI_TEMPERATURE
        value: "0.7"

      # ── JVM Tuning for Free Tier (512MB RAM) ──
      - key: JAVA_OPTS
        value: -Xmx256m -Xms128m -XX:+UseSerialGC -Xss256k -XX:MaxMetaspaceSize=96m -XX:ReservedCodeCacheSize=64m -XX:TieredStopAtLevel=1 -XX:+UseCompressedOops -Djava.security.egd=file:/dev/./urandom
