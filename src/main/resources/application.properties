# Server Configuration
server.port=${PORT:8080}
spring.application.name=banking-system

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.format_sql=true

# OAuth2 Configuration (Google)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-test-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-test-client-secret}
spring.security.oauth2.client.registration.google.redirect-uri=${APPLICATION_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Credit Score Service Configuration
credit.score.service.url=${CREDIT_SCORE_SERVICE_URL:http://127.0.0.1:8083}

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.com.bankingsystem=DEBUG

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Disable JPA open-in-view warning
spring.jpa.open-in-view=false

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true

# Spring DevTools Configuration
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/webapp
spring.devtools.restart.exclude=static/**,public/**,resources/**
