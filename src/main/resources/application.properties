# Server Configuration
server.port=${PORT:8080}
spring.application.name=banking-system

# Trust reverse proxy headers (Render, Heroku, etc.) — required to prevent redirect loops
server.forward-headers-strategy=FRAMEWORK

# Graceful Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool (tuned for free-tier DB)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=15
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# OAuth2 Configuration (Google)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-test-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-test-client-secret}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Credit Score Service Configuration
credit.score.service.url=${CREDIT_SCORE_SERVICE_URL:http://127.0.0.1:8083}

# Logging (INFO for production, DEBUG only for local development)
logging.level.root=WARN
logging.level.org.springframework.web=INFO
logging.level.com.bankingsystem=INFO
logging.level.org.hibernate.SQL=WARN

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Disable JPA open-in-view warning
spring.jpa.open-in-view=false

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true

# ──────────────────────────────────────────────
# AI Configuration — all values are Render env-var driven
# ──────────────────────────────────────────────
ai.enabled=${AI_ENABLED:true}
ai.provider=${AI_PROVIDER:gemini}
ai.api-key=${AI_API_KEY:}
ai.model=${AI_MODEL:gemini-1.5-flash}

# Token limits (admin gets more for richer analytics)
ai.max-tokens=${AI_MAX_TOKENS:600}
ai.admin-max-tokens=${AI_ADMIN_MAX_TOKENS:900}

# Role-specific temperatures
# Admin: precision analytics (low temp = deterministic)
# Customer: warm conversational coach (moderate temp)
ai.admin-temperature=${AI_ADMIN_TEMPERATURE:0.2}
ai.customer-temperature=${AI_CUSTOMER_TEMPERATURE:0.65}

# HTTP timeout for Gemini API calls
ai.timeout-seconds=${AI_TIMEOUT_SECONDS:30}

# In-session conversation history depth (number of turns)
ai.max-conversation-history=${AI_MAX_CONVERSATION_HISTORY:6}

# Enable/disable outbound response output filtering
ai.response-output-filter-enabled=${AI_OUTPUT_FILTER_ENABLED:true}

